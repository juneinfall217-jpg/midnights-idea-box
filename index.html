<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Midnights</title>
  <style>
    :root {
      color-scheme: light;
      --midnight: #101b3d;
      --midnight-2: #192a5a;
      --ink: #17213f;
      --paper: rgba(255, 252, 246, 0.9);
      --paper-solid: #fffaf1;
      --line: rgba(30, 40, 78, 0.16);
      --muted: #71748a;
      --red: #8b3e3e;
      --blue: #2e4a8e;
      --gold: #c7a46a;
      --sky: #9db7c9;
      --shadow: 0 18px 48px rgba(12, 18, 42, 0.18);
      --radius: 14px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      color: #f5f1e8;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1832;
      letter-spacing: 0;
      isolation: isolate;
    }
    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -3;
      background:
        radial-gradient(ellipse at 50% 44%, rgba(255, 213, 119, 0.34), transparent 18%),
        linear-gradient(180deg,
          #f5dda1 0%,
          #efc56e 37%,
          #e9b85f 43%,
          rgba(222, 161, 75, 0.52) 45%,
          #182b56 48%,
          #102044 66%,
          #091630 100%);
      pointer-events: none;
    }
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      background:
        radial-gradient(circle at 50% 43.5%, rgba(255,236,165,0.45) 0 38px, rgba(255,221,130,0.22) 42px, transparent 108px),
        repeating-conic-gradient(from -72deg at 50% 43.5%, transparent 0 6deg, rgba(43,36,28,0.28) 6.4deg 6.9deg, transparent 7.5deg 15deg),
        linear-gradient(180deg, transparent 0 41%, rgba(255,211,116,0.18) 45%, rgba(243,181,83,0.07) 55%, transparent 66%),
        radial-gradient(ellipse at 50% 47%, rgba(244,184,80,0.16), transparent 26%),
        repeating-linear-gradient(101deg, rgba(255,255,255,0.016) 0 1px, transparent 1px 7px);
      background-size: auto, auto, auto, auto, 100% 100%;
      background-position: center;
      opacity: 0.58;
      clip-path: inset(0);
      animation: sunshineBreathe 8s ease-in-out infinite alternate;
      pointer-events: none;
    }

    .home-atmosphere {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      overflow: hidden;
    }
    .home-atmosphere::before {
      content: "";
      position: absolute;
      inset: 43% 0 0;
      background:
        linear-gradient(180deg, rgba(242,184,84,0.16), transparent 18%),
        repeating-linear-gradient(104deg, transparent 0 48px, rgba(231,242,255,0.18) 49px 50px, transparent 51px 120px),
        repeating-linear-gradient(104deg, transparent 0 82px, rgba(255,255,255,0.22) 83px 84px, transparent 85px 190px);
      background-size: 100% 100%, 220px 290px, 330px 390px;
      animation: rainFallA 13s linear infinite;
      opacity: 0.54;
    }
    .home-atmosphere::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 50% 45%, rgba(255,236,172,0.14), transparent 20%),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.014) 0 1px, transparent 1px 5px);
      opacity: 0.46;
      mix-blend-mode: soft-light;
    }
    .weather-copy {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(17, 28, 60, 0.54);
      font-family: "Courier New", IBM Plex Mono, monospace;
      font-size: clamp(11px, 1.3vw, 16px);
      letter-spacing: 0.02em;
      white-space: nowrap;
      text-transform: lowercase;
    }
    .weather-copy.sunshine { top: 25%; color: rgba(37, 31, 24, 0.54); }
    .weather-copy.rain { bottom: 7%; color: rgba(242, 246, 255, 0.58); }

    .intro {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(ellipse at 48% 46%, #34456e 0%, #26365f 32%, #1a274c 68%, #121c39 100%);
      transition: opacity 1.1s ease, visibility 1.1s ease;
    }
    .intro::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(112deg, transparent 0 30%, rgba(230,244,244,0.11) 38%, transparent 48%),
        repeating-linear-gradient(101deg, rgba(255,255,255,0.02) 0 1px, transparent 1px 8px),
        repeating-radial-gradient(ellipse at 50% 50%, rgba(245,241,232,0.026) 0 1px, transparent 2px 7px),
        radial-gradient(circle at 17% 20%, rgba(245,241,232,0.16), transparent 1px),
        radial-gradient(circle at 70% 32%, rgba(245,241,232,0.12), transparent 1px);
      background-size: auto, 100% 100%, 100% 100%, 210px 210px, 280px 280px;
      opacity: 0.68;
    }
    .intro.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .vortex {
      position: absolute;
      inset: -10%;
      transform-style: preserve-3d;
    }
    .vortex-word {
      position: absolute;
      left: 50%;
      top: 50%;
      color: #f3f2ee;
      font-family: var(--font);
      font-size: var(--size);
      font-weight: var(--weight);
      line-height: 1;
      opacity: var(--o);
      transform: translate(-50%, -50%) translate(var(--x), var(--y));
      transform-origin: center;
      white-space: nowrap;
      animation: wordArrive 4.8s ease both;
      animation-delay: var(--delay);
    }
    .enter-copy { display: none; }
    .enter-copy h1 {
      margin: 0;
      font-size: clamp(44px, 8vw, 112px);
      line-height: 0.9;
      letter-spacing: -0.03em;
      color: #2e4a8e;
    }
    .enter-copy p { margin: 0; color: #5e6c9e; font-weight: 800; }

    .launch-btn, .create-float {
      min-height: 56px;
      border: 0;
      color: #07175d;
      background: transparent;
      font-size: clamp(20px, 2.6vw, 38px);
      font-weight: 950;
      letter-spacing: -0.04em;
      text-transform: uppercase;
      transform: rotate(-8deg) skewX(-10deg);
      text-shadow:
        0 18px 0 rgba(7, 23, 93, 0.14),
        0 36px 22px rgba(7, 23, 93, 0.15);
      transition: transform 0.25s ease, text-shadow 0.25s ease;
    }
    .create-float {
      position: fixed;
      left: 50%;
      bottom: 26px;
      z-index: 12;
      --glass-shine-x: -16%;
      --glass-shine-y: -18%;
      --glass-shine-opacity: 0.54;
      --glass-shine-angle: 122deg;
      --glass-parallax-y: 0px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-content: center;
      align-items: center;
      gap: 6px 18px;
      width: min(410px, calc(100% - 34px));
      min-height: 116px;
      padding: 24px 28px 22px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.26);
      border-radius: 18px;
      color: #172448;
      background: rgba(245, 245, 240, 0.12);
      backdrop-filter: blur(18px) saturate(115%);
      -webkit-backdrop-filter: blur(18px) saturate(115%);
      box-shadow:
        0 14px 36px rgba(8,16,42,0.20),
        inset 0 1px 0 rgba(255,255,255,0.28),
        inset 0 -1px 0 rgba(8,16,42,0.08);
      font-size: 16px;
      line-height: 1;
      text-align: left;
      transform: translateX(-50%);
      text-shadow: none;
      transform-origin: 50% 50%;
      white-space: normal;
      isolation: isolate;
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
    }
    .create-float::before,
    .create-float::after {
      content: "";
      position: absolute;
      pointer-events: none;
    }
    .create-float::before {
      inset: -35%;
      z-index: 1;
      background:
        radial-gradient(ellipse at 28% 18%, rgba(255,255,255,0.12), transparent 28%),
        linear-gradient(
          var(--glass-shine-angle, 122deg),
          transparent 36%,
          rgba(255,255,255,0.07) 45%,
          rgba(255,255,255,0.24) 50%,
          rgba(255,255,255,0.08) 55%,
          transparent 64%
        );
      opacity: var(--glass-shine-opacity, 0.54);
      transform: translate3d(var(--glass-shine-x, -16%), var(--glass-shine-y, -18%), 0);
      transition: opacity 180ms ease;
    }
    .create-float::after {
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(circle at 50% 43%, rgba(255,236,164,0.35) 0 20px, rgba(255,216,124,0.14) 22px 52px, transparent 55px),
        repeating-conic-gradient(from -72deg at 50% 43%, transparent 0 10deg, rgba(23,36,72,0.14) 10.5deg 11deg, transparent 11.8deg 20deg),
        linear-gradient(180deg,
          rgba(248,225,165,0.34) 0%,
          rgba(239,196,101,0.24) 43%,
          rgba(224,164,77,0.08) 49%,
          rgba(17,37,75,0.34) 53%,
          rgba(7,20,48,0.42) 100%),
        repeating-linear-gradient(104deg, transparent 0 32px, rgba(241,247,255,0.17) 33px 34px, transparent 35px 86px),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.025) 0 1px, transparent 1px 5px);
      background-size: auto, auto, auto, 150px 210px, 100% 100%;
      background-position: center, center, center, 0 var(--glass-parallax-y, 0px), center;
      opacity: 0.76;
      transform: translateY(var(--glass-parallax-y, 0px));
      mix-blend-mode: soft-light;
    }
    .create-kicker,
    .create-main,
    .create-arrow {
      position: relative;
      z-index: 2;
    }
    .create-kicker {
      grid-column: 1;
      align-self: end;
      font-size: clamp(12px, 1.1vw, 15px);
      font-weight: 520;
      letter-spacing: 0.055em;
      color: #172448;
      text-shadow: 0 1px 0 rgba(255,255,255,0.25);
    }
    .create-main {
      grid-column: 1;
      align-self: start;
      max-width: 11.5em;
      font-size: clamp(24px, 2.4vw, 34px);
      font-weight: 780;
      letter-spacing: -0.025em;
      color: #f3f2ee;
      -webkit-text-stroke: 1px rgba(23, 36, 72, 0.1);
      text-shadow: 0 1px 0 rgba(23,36,72,0.18), 0 8px 18px rgba(4,10,28,0.16);
    }
    .create-arrow {
      grid-column: 2;
      grid-row: 1 / span 2;
      align-self: end;
      padding-bottom: 6px;
      color: #f3f2ee;
      font-size: clamp(24px, 2.4vw, 32px);
      font-weight: 520;
      text-shadow: 0 1px 0 rgba(23,36,72,0.2);
      transition: transform 0.22s ease;
    }
    .launch-btn:hover { transform: rotate(-8deg) skewX(-10deg) translateX(6px); }
    .create-float:hover {
      transform: translateX(-50%) translateY(-4px);
      border-color: rgba(255,255,255,0.34);
      box-shadow:
        0 18px 42px rgba(8,16,42,0.22),
        inset 0 1px 0 rgba(255,255,255,0.34),
        inset 0 -1px 0 rgba(8,16,42,0.08);
    }
    .create-float:hover .create-arrow { transform: translateX(4px); }
    .launch-btn::after { content: "  →"; }

    .app-shell {
      min-height: 100vh;
      display: block;
      width: min(1480px, 100%);
      margin: 0 auto;
      padding: 28px 34px 150px;
    }
    .side { display: none; }
    .side::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 24% 20%, rgba(255,255,255,0.18), transparent 1px);
      background-size: 26px 26px;
      animation: twinkle 2.8s ease-in-out infinite alternate;
      pointer-events: none;
    }
    .brand-title {
      position: relative;
      z-index: 1;
      margin: 0 0 24px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 38px;
      line-height: 1;
      font-weight: 700;
      color: #fff7e8;
      text-shadow: 0 12px 28px rgba(0,0,0,0.32);
    }
    .brand-title::after {
      content: "";
      position: absolute;
      left: 3px;
      bottom: -12px;
      width: 116px;
      height: 16px;
      border-bottom: 2px solid rgba(255, 247, 232, 0.75);
      border-radius: 50%;
    }
    .nav, .cloud { position: relative; z-index: 1; display: grid; gap: 9px; }
    .nav button {
      min-height: 40px;
      border: 0;
      border-radius: 8px;
      color: rgba(255,255,255,0.78);
      background: transparent;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      text-align: left;
      font-weight: 800;
    }
    .nav button.active, .nav button:hover { background: rgba(255,255,255,0.12); color: white; }
    .side-label { margin: 20px 0 10px; color: rgba(255,255,255,0.58); font-size: 12px; font-weight: 900; }
    .cloud { display: flex; flex-wrap: wrap; }
    .tag-chip { border: 0; border-radius: 999px; padding: 6px 9px; color: rgba(255,255,255,0.82); background: rgba(255,255,255,0.12); font-size: 12px; font-weight: 800; }
    .belief { position: absolute; left: 18px; right: 18px; bottom: 22px; z-index: 1; color: rgba(255,255,255,0.82); font-family: Georgia, serif; font-size: 13px; line-height: 1.35; }

    .workspace {
      min-width: 0;
      display: grid;
      gap: 22px;
      align-content: start;
    }
    .topbar {
      display: grid;
      grid-template-columns: auto minmax(260px, 1fr) auto;
      gap: 18px;
      align-items: center;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      backdrop-filter: blur(18px);
      box-shadow: none;
    }
    .topbar #categoryNav { grid-column: 1 / -1; }
    .searchline { display: grid; grid-template-columns: minmax(0, 1fr) 150px; gap: 10px; }
    input, textarea, select {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 999px;
      background: rgba(245, 242, 236, 0.74);
      color: var(--ink);
      outline: none;
      padding: 10px 14px;
      backdrop-filter: blur(18px);
    }
    .modal input, .modal textarea, .modal select, .drawer input, .drawer textarea, .drawer select { border-radius: 10px; background: rgba(255,255,255,0.68); border-color: rgba(31,42,75,0.12); }
    textarea { min-height: 160px; resize: vertical; line-height: 1.55; }
    input:focus, textarea:focus, select:focus { border-color: color-mix(in srgb, var(--theme, #617fb2) 50%, white); box-shadow: 0 0 0 3px color-mix(in srgb, var(--theme, #617fb2) 18%, transparent); }

    .mid-title {
      position: relative;
      display: inline-block;
      margin: 0;
      padding: 0 2px 6px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(32px, 3.4vw, 56px);
      color: #f5f1e8;
      filter: url(#wet-title);
      white-space: nowrap;
    }
    .mid-title::after {
      content: "";
      position: absolute;
      left: 8%;
      right: 10%;
      top: 58%;
      height: 80px;
      background: linear-gradient(180deg, rgba(245, 241, 232, 0.16), transparent);
      filter: blur(8px);
      opacity: 0.55;
      animation: rainDrip 3.8s ease-in-out infinite alternate;
      pointer-events: none;
    }

    .filters { display: flex; flex-wrap: wrap; gap: 10px; }
    .filter-pill {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(245, 242, 236, 0.12);
      color: rgba(245,241,232,0.76);
      padding: 7px 14px;
      font-weight: 650;
      backdrop-filter: blur(12px);
    }
    .filter-pill.active { color: #11182f; background: rgba(245,241,232,0.82); border-color: rgba(255,255,255,0.34); }
    .theme-fanfic { --theme: #8c4b53; --theme-soft: rgba(140,75,83,0.16); --theme-strong: #4d2634; --category-gradient: radial-gradient(circle at 18% 12%, rgba(245,214,200,0.9), transparent 28%), linear-gradient(135deg, #c99a93 0%, #8c4b53 54%, #4d2634 100%); --ink-on-card:#f5f1e8; --body-on-card:rgba(245,241,232,0.82); }
    .theme-homework { --theme: #405f9e; --theme-soft: rgba(64,95,158,0.16); --theme-strong: #18264a; --category-gradient: radial-gradient(circle at 12% 10%, rgba(232,241,247,0.95), transparent 26%), linear-gradient(135deg, #9cb3cc 0%, #405f9e 56%, #18264a 100%); --ink-on-card:#f5f1e8; --body-on-card:rgba(245,241,232,0.8); }
    .theme-media { --theme: #b88a45; --theme-soft: rgba(184,138,69,0.17); --theme-strong: #3b2f35; --category-gradient: radial-gradient(circle at 16% 14%, rgba(245,220,170,0.92), transparent 26%), linear-gradient(135deg, #c99a54 0%, #9c6540 52%, #3b2f35 100%); --ink-on-card:#f5f1e8; --body-on-card:rgba(245,241,232,0.78); }
    .theme-life { --theme: #8fafc0; --theme-soft: rgba(143,175,192,0.2); --theme-strong: #435c85; --category-gradient: radial-gradient(circle at 14% 12%, rgba(247,250,250,0.96), transparent 25%), linear-gradient(135deg, #d4dee4 0%, #8fafc0 50%, #435c85 100%); --ink-on-card:#1b2340; --body-on-card:#4e566d; }
    .theme-custom { --theme: #b36aa3; --theme-soft: rgba(179,106,163,0.18); --theme-strong: #8b3f78; --category-gradient: radial-gradient(circle at 12% 10%, rgba(255,240,230,0.95), transparent 27%), linear-gradient(135deg, #f0c0bb 0%, #cf7795 56%, #8b3f78 100%); --ink-on-card:#1b2340; --body-on-card:#4e566d; }

    .masonry {
      column-count: 3;
      column-gap: 22px;
    }
    .card {
      position: relative;
      display: inline-block;
      width: 100%;
      break-inside: avoid;
      margin: 0 0 24px;
      overflow: hidden;
      min-height: var(--card-h, 280px);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 18px;
      color: var(--ink-on-card);
      background:
        linear-gradient(rgba(15, 20, 40, 0.12), rgba(15, 20, 40, 0.28)),
        var(--category-gradient);
      box-shadow: 0 14px 36px rgba(4,10,28,0.20);
      vertical-align: top;
      transition: transform 240ms ease-out, box-shadow 240ms ease-out;
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 20px 46px rgba(4,10,28,0.28); }
    .card-bg {
      position: absolute;
      inset: 0;
      background: var(--cover, url("./assets/midnights-stars.jpg")) center / cover no-repeat;
      opacity: 1;
      filter: saturate(0.92) contrast(0.96);
      transform: scale(1.02);
      transition: transform 240ms ease-out;
    }
    .card:hover .card-bg { transform: scale(1.04); }
    .card:not(.has-cover) .card-bg { display: none; }
    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        linear-gradient(116deg, transparent 0 34%, rgba(231,248,248,0.1) 43%, transparent 53%),
        linear-gradient(18deg, rgba(255,255,255,0.035), transparent 42%),
        repeating-linear-gradient(98deg, rgba(255,255,255,0.026) 0 1px, transparent 1px 7px),
        repeating-radial-gradient(ellipse at 58% 44%, rgba(255,255,255,0.024) 0 1px, transparent 2px 8px),
        radial-gradient(ellipse at 32% 18%, rgba(214,236,234,0.08), transparent 36%),
        radial-gradient(ellipse at 80% 92%, rgba(4,10,28,0.12), transparent 42%);
      opacity: 0.48;
      mix-blend-mode: soft-light;
    }
    .card.has-cover::after { content: ""; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(7,11,28,0.02), rgba(7,11,28,0.1) 32%, rgba(7,11,28,0.62) 68%, rgba(7,11,28,0.9)); pointer-events: none; }
    .card:not(.has-cover)::after { content: ""; position: absolute; inset: 0; background: radial-gradient(circle at 24% 18%, rgba(255,255,255,0.12), transparent 2px), repeating-radial-gradient(circle, rgba(255,255,255,0.026) 0 1px, transparent 1px 5px); background-size: 26px 26px, 6px 6px; pointer-events: none; opacity: 0.36; }
    .card-fog {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 58%;
      background: var(--cover) center bottom / cover no-repeat;
      filter: blur(18px) saturate(0.85);
      transform: scale(1.08);
      opacity: 0;
      mask-image: linear-gradient(180deg, transparent, #000 34%);
      pointer-events: none;
    }
    .card.has-cover .card-fog { opacity: 0.68; }
    .card-inner { position: relative; z-index: 1; min-height: var(--card-h, 280px); padding: 18px; display: grid; gap: 12px; align-content: end; }
    .card h2 { margin: 0; font-size: clamp(19px, 1.5vw, 25px); line-height: 1.18; color: var(--ink-on-card); font-weight: 650; text-shadow: 0 10px 24px rgba(0,0,0,0.16); }
    .card p { margin: 0; color: var(--body-on-card); line-height: 1.58; white-space: pre-wrap; font-weight: 400; }
    .card.has-cover h2 { color: #f5f1e8; }
    .card.has-cover p { color: rgba(245,241,232,0.82); }
    .card-cover { display: none; }
    .meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .pill { display: inline-flex; align-items: center; min-height: 23px; border: 1px solid rgba(255,255,255,0.24); border-radius: 999px; padding: 4px 8px; background: rgba(255,255,255,0.14); color: rgba(245,241,232,0.8); font-size: 12px; font-weight: 650; backdrop-filter: blur(8px); }
    .card:not(.has-cover) .pill { color: color-mix(in srgb, var(--ink-on-card) 72%, white); background: rgba(255,255,255,0.16); }
    .card .pill:first-child, .modal .pill.category-pill { background: rgba(255,255,255,0.16); border-color: rgba(255,255,255,0.26); color: currentColor; }
    .modal .pill, .drawer .pill, .mind-map .pill { border-color: var(--line); background: rgba(255,255,255,0.66); color: #4a4f68; }

      { id:"sample-novel", title:"花木兰现代身份线", body:"选择同人文还是小说灵感？：小说\n主角是谁：一个以为自己在选择的人\n主要灵感点：镜前换装\n故事内核：选择权和结构\n素材收集：木兰诗、现代教育经验\n主要情节点：她说出自己的选择", category:"同人文/小说", subcategory:"小说", status:"灵感", deadline:"", rating:"", cover:"", outline:"选择同人文还是小说灵感？：小说\n主角是谁：一个以为自己在选择的人\n主要灵感点：镜前换装\n故事内核：选择权和结构\n素材收集：木兰诗、现代教育经验\n主要情节点：她说出自己的选择", tags:["花木兰","身份","选择"], urgent:false, createdAt:now-120000, updatedAt:now-120000 }
    ]; }
    function ensureSeedIdeas(items) { const ids = new Set(items.map(i => i.id)); return [...sampleIdeas().filter(i => i.id.startsWith("codex-role-") && !ids.has(i.id)), ...items]; }

    function buildVortex() {
      if (vortexFrame) cancelAnimationFrame(vortexFrame);
      orbitWords = [];
      const shortSide = Math.min(innerWidth, innerHeight);
      const rings = [
        { count: 8, rx: shortSide * 0.56, ry: shortSide * 0.34, size: 76, opacity: 0.72, direction: 1, speed: 0.000028, offset: 0.16 },
        { count: 8, rx: shortSide * 0.44, ry: shortSide * 0.27, size: 55, opacity: 0.68, direction: -1, speed: 0.000036, offset: 0.48 },
        { count: 7, rx: shortSide * 0.33, ry: shortSide * 0.2, size: 36, opacity: 0.66, direction: 1, speed: 0.000047, offset: 0.2 },
        { count: 7, rx: shortSide * 0.24, ry: shortSide * 0.15, size: 24, opacity: 0.58, direction: -1, speed: 0.000061, offset: 0.6 },
        { count: 6, rx: shortSide * 0.15, ry: shortSide * 0.095, size: 15, opacity: 0.5, direction: 1, speed: 0.000078, offset: 0.36 }
      ];
      const fragments = [];
      rings.forEach((ring, ringIndex) => {
        for (let i = 0; i < ring.count; i += 1) {
          const angle = (Math.PI * 2 * i) / ring.count + ring.offset + ringIndex * 0.11;
          const isBold = (i + ringIndex) % 2 === 0;
          const font = isBold ? 'Inter, Helvetica, Arial, sans-serif' : '"Courier New", "IBM Plex Mono", monospace';
          const weight = isBold ? 900 : 500;
          const size = ring.size * (0.93 + (i % 3) * 0.04);
          const opacity = ring.opacity - (i % 4) * 0.035;
          fragments.push(`<span class="vortex-word" data-orbit="${orbitWords.length}" style="--x:0px;--y:0px;--size:${size.toFixed(1)}px;--o:${opacity.toFixed(2)};--font:${font};--weight:${weight};--delay:${(ringIndex * 0.08 + i * 0.018).toFixed(2)}s;">Midnights</span>`);
          orbitWords.push({
            angle,
            rx: ring.rx * (0.985 + (i % 2) * 0.035),
            ry: ring.ry * (0.98 + (i % 3) * 0.03),
            speed: ring.speed * (0.94 + (i % 5) * 0.035),
            direction: ring.direction
          });
        }
      });
      els.vortex.innerHTML = fragments.join("");
      orbitWords = orbitWords.map((word, index) => ({ ...word, el: els.vortex.querySelector(`[data-orbit="${index}"]`) }));
      animateVortex(performance.now());
    }
    function animateVortex(now) {
      orbitWords.forEach(word => {
        if (!word.el) return;
        const angle = word.angle + now * word.speed * word.direction;
        word.el.style.setProperty("--x", `${(Math.cos(angle) * word.rx).toFixed(1)}px`);
        word.el.style.setProperty("--y", `${(Math.sin(angle) * word.ry).toFixed(1)}px`);
      });
      vortexFrame = requestAnimationFrame(animateVortex);
    }
    function setCreateGlassVariables(values) {
      if (!els.openCreate) return;
      els.openCreate.style.setProperty("--glass-shine-x", `${values.x.toFixed(2)}%`);
      els.openCreate.style.setProperty("--glass-shine-y", `${values.y.toFixed(2)}%`);
      els.openCreate.style.setProperty("--glass-shine-opacity", values.opacity.toFixed(3));
      els.openCreate.style.setProperty("--glass-shine-angle", `${values.angle.toFixed(2)}deg`);
      els.openCreate.style.setProperty("--glass-parallax-y", `${values.parallax.toFixed(2)}px`);
    }
    function updateCreateGlassTarget() {
      if (matchMedia("(prefers-reduced-motion: reduce)").matches) {
        setCreateGlassVariables({ x: -8, y: -8, opacity: 0.44, angle: 122, parallax: 0 });
        return;
      }
      const maxScroll = Math.max(1, document.documentElement.scrollHeight - innerHeight);
      const progress = Math.min(1, Math.max(0, scrollY / maxScroll));
      glassMotion.target = {
        x: -20 + progress * 40,
        y: -22 + progress * 38,
        opacity: 0.48 + Math.sin(progress * Math.PI) * 0.18,
        angle: 116 + progress * 24,
        parallax: -3 + progress * 6
      };
      if (!glassMotion.frame) glassMotion.frame = requestAnimationFrame(tickCreateGlass);
    }
    function tickCreateGlass() {
      glassMotion.frame = null;
      let moving = false;
      Object.keys(glassMotion.current).forEach(key => {
        const next = glassMotion.current[key] + (glassMotion.target[key] - glassMotion.current[key]) * 0.12;
        if (Math.abs(next - glassMotion.target[key]) > 0.01) moving = true;
        glassMotion.current[key] = next;
      });
      setCreateGlassVariables(glassMotion.current);
      if (moving) glassMotion.frame = requestAnimationFrame(tickCreateGlass);
    }
    function populateFormOptions() { els.category.innerHTML = Object.keys(categories).map(c => `<option>${escapeHtml(c)}</option>`).join(""); updateSubcategories(); }
    function updateSubcategories() { const opts = categories[els.category.value] || ["自定义"]; const current = els.subcategory.value; els.subcategory.innerHTML = opts.map(o => `<option>${escapeHtml(o)}</option>`).join(""); els.subcategory.value = opts.includes(current) ? current : opts[0]; updateConditionalFields(); }
    function updateConditionalFields() {
      const isNovel = els.category.value === "同人文/小说";
      const isMedia = els.category.value === "影视文学作品";
      els.bodyField.classList.toggle("hidden", isNovel);
      els.mindBuilder.classList.toggle("show", isNovel);
      els.mediaFields.style.display = isMedia ? "grid" : "none";
      els.customFields.classList.toggle("hidden", els.category.value !== "自定义" && els.subcategory.value !== "自定义");
      els.customCategory.parentElement.style.display = els.category.value === "自定义" ? "block" : "none";
      els.customSubcategory.parentElement.style.display = els.subcategory.value === "自定义" ? "block" : "none";
      applyModalTheme();
      if (isNovel) renderMindInputs();
    }
    function renderMindInputs(values = {}) { els.mindSteps.innerHTML = mindPrompts.map((p, i) => `<div class="mind-step" style="animation-delay:${i*0.05}s"><label>${escapeHtml(p)}</label><input data-mind="${escapeHtml(p)}" value="${escapeHtml(values[p] || "")}" placeholder="点击后填写这一节点"></div>`).join(""); }
    function parseOutline(text) { const obj = {}; String(text || "").split(/\n+/).forEach(line => { const [k, ...rest] = line.split(/[：:]/); if (k && rest.length) obj[k.trim()] = rest.join("：").trim(); }); return obj; }
    function collectOutline() { if (els.category.value !== "同人文/小说") return ""; return [...els.mindSteps.querySelectorAll("input[data-mind]")].map(input => `${input.dataset.mind}：${input.value.trim()}`).filter(line => !line.endsWith("：")).join("\n"); }
    function selectedCategory() { return els.category.value === "自定义" ? (els.customCategory.value.trim() || "自定义") : els.category.value; }
    function selectedSubcategory() { return els.subcategory.value === "自定义" ? (els.customSubcategory.value.trim() || "自定义") : els.subcategory.value; }
    function ratingPercent(rating) { const n = Math.max(0, Math.min(5, Number(rating) || 0)); return `${n / 5 * 100}%`; }
    function renderStars(rating) { if (rating === "" || rating === null || rating === undefined) return ""; return `<span class="stars" style="--rating:${ratingPercent(rating)}"></span><span class="pill">${Number(rating).toFixed(1)}/5</span>`; }
    function renderNav() { const names = ["all", ...Object.keys(categories), ...ideas.map(i => i.category).filter(c => !Object.keys(categories).includes(c))]; const unique = [...new Set(names)]; els.nav.innerHTML = unique.map(name => `<button class="filter-pill ${name !== "all" ? categoryClass(name) : ""} ${activeCategory === name ? "active" : ""}" data-cat="${escapeHtml(name)}">${name === "all" ? "全部" : escapeHtml(name)}</button>`).join(""); }
    function renderSubFilters() { const opts = activeCategory === "all" ? [] : categories[activeCategory] || []; els.subFilters.className = `filters ${activeCategory !== "all" ? categoryClass(activeCategory) : ""}`; els.subFilters.innerHTML = [`<button class="filter-pill ${activeSubcategory === "all" ? "active" : ""}" data-sub="all">全部</button>`, ...opts.map(o => `<button class="filter-pill ${activeSubcategory === o ? "active" : ""}" data-sub="${escapeHtml(o)}">${escapeHtml(o)}</button>`)].join(""); }
    function renderTags() {}
    function filteredIdeas() { const kw = els.search.value.trim().toLowerCase(); const status = els.statusFilter.value; return ideas.filter(i => { const text = [i.title,i.body,i.category,i.subcategory,i.outline,...(i.tags||[])].join(" ").toLowerCase(); return (!kw || text.includes(kw)) && (activeCategory === "all" || i.category === activeCategory) && (activeSubcategory === "all" || i.subcategory === activeSubcategory) && (status === "all" || (status === "urgent" ? i.urgent : status === "deadline" ? Boolean(i.deadline) : i.status === status)); }).sort((a,b) => Number(!!b.urgent)-Number(!!a.urgent) || (daysUntil(a.deadline) ?? 9999) - (daysUntil(b.deadline) ?? 9999) || b.updatedAt - a.updatedAt); }
    function renderMindMap(idea) { if (idea.category !== "同人文/小说" || !idea.outline) return ""; const nodes = String(idea.outline).split(/\n+/).filter(Boolean); return `<div class="mind-map"><div class="map-root">${escapeHtml(idea.title)}</div><div class="map-branches">${nodes.map(n => `<div class="map-node">${escapeHtml(n)}</div>`).join("")}</div></div>`; }
    function renderCard(idea) {
      const deadline = deadlineLabel(idea.deadline);
      const shownTags = (idea.tags || []).slice(0, 2).map(t => `<span class="pill">#${escapeHtml(t)}</span>`).join("");
      const moreTags = (idea.tags || []).length > 2 ? `<span class="pill">+${(idea.tags || []).length - 2}</span>` : "";
      const cardText = idea.category === "同人文/小说" ? (idea.outline || idea.body || "还没有写内容。") : (idea.body || "还没有写内容。");
      const height = idea.cover ? 420 : Math.min(420, 238 + Math.ceil(cardText.length / 55) * 34 + Math.ceil(idea.title.length / 18) * 22);
      const bg = `style="${idea.cover ? `--cover:url('${idea.cover}');` : ""}--card-h:${height}px;"`;
      const status = idea.status && idea.status !== "灵感" ? `<span class="pill">${escapeHtml(idea.status)}</span>` : "";
      return `<article class="card ${categoryClass(idea.category)} ${idea.cover ? "has-cover" : ""}" data-id="${escapeHtml(idea.id)}" ${bg}>
        <div class="card-bg"></div>
        <div class="card-fog"></div>
        <div class="card-top">
          <span class="pill">${escapeHtml(idea.category)}</span>
          <div class="card-tools">
            <button class="icon-btn ${idea.urgent ? "active" : ""}" data-action="urgent" title="紧急处理">☆</button>
            <button class="icon-btn" type="button" title="更多">···</button>
            <div class="more-menu">
              <button class="menu-action" data-action="edit" type="button">编辑</button>
              <button class="menu-action" data-action="delete" type="button">删除</button>
            </div>
          </div>
        </div>
        <div class="card-inner">
          <div>
            <h2>${escapeHtml(idea.title)}</h2>
            <p>${escapeHtml(cardText.slice(0, 96))}${cardText.length > 96 ? "..." : ""}</p>
          </div>
          <div class="meta"><span class="pill">${escapeHtml(idea.subcategory || "自定义")}</span>${status}${idea.urgent ? `<span class="pill urgent">紧急</span>` : ""}${deadline ? `<span class="pill deadline">${escapeHtml(deadline)}</span>` : ""}${renderStars(idea.rating)}${shownTags}${moreTags}</div>
        </div>
      </article>`;
    }
    function render() { renderNav(); renderSubFilters(); renderTags(); const shown = filteredIdeas(); els.list.innerHTML = shown.length ? shown.map(renderCard).join("") : `<div class="empty"><strong>这里还没有灵感</strong><br>点底部 create your own inspiration。</div>`; saveIdeas(); }
    function syncRating(value) {
      const numeric = Number(value);
      const rating = value === "" || Number.isNaN(numeric) ? "" : Math.max(0, Math.min(5, numeric)).toFixed(1);
      els.rating.value = rating;
      els.ratingRange.value = rating || 0;
      els.ratingStars.style.setProperty("--rating", ratingPercent(rating));
    }
    function openCreate(id = null) { editingId = id; const idea = ideas.find(i => i.id === id); els.formTitle.textContent = idea ? "编辑灵感工作区" : "创建灵感工作区"; els.submitBtn.textContent = idea ? "更新灵感" : "保存灵感"; els.form.reset(); pendingCover = idea?.cover || ""; els.title.value = idea?.title || ""; els.body.value = idea?.body || ""; const category = normalizeCategory(idea?.category) || Object.keys(categories)[0]; els.category.value = Object.keys(categories).includes(category) ? category : "自定义"; els.customCategory.value = Object.keys(categories).includes(category) ? "" : category; updateSubcategories(); const opts = categories[els.category.value] || []; if (idea) { els.subcategory.value = opts.includes(idea.subcategory) ? idea.subcategory : "自定义"; els.customSubcategory.value = opts.includes(idea.subcategory) ? "" : idea.subcategory || ""; } updateConditionalFields(); els.status.value = idea?.status || "灵感"; els.deadline.value = idea?.deadline || ""; syncRating(idea?.rating ?? ""); els.tags.value = (idea?.tags || []).join(", "); els.urgent.checked = Boolean(idea?.urgent); if (els.category.value === "同人文/小说") renderMindInputs(parseOutline(idea?.outline || idea?.body || "")); if (pendingCover) { els.coverPreview.src = pendingCover; els.coverPreview.classList.add("show"); } else { els.coverPreview.removeAttribute("src"); els.coverPreview.classList.remove("show"); } showModal(); }
    function showModal() { applyModalTheme(); els.overlay.classList.add("show"); els.createModal.classList.add("show"); }
    function closeModal() { els.overlay.classList.remove("show"); els.createModal.classList.remove("show"); }
    function closeDetail() { els.overlay.classList.remove("show"); els.detailDrawer.classList.remove("show"); }
    function showDetail(id) { const idea = ideas.find(i => i.id === id); if (!idea) return; const text = idea.category === "同人文/小说" ? (idea.outline || idea.body) : idea.body; const words = String(text || "").replace(/\s+/g, "").length; els.detailBody.innerHTML = `<div class="drawer-main">${idea.cover ? `<img class="detail-cover" src="${idea.cover}" alt="">` : ""}<div class="meta"><span class="pill">${escapeHtml(idea.category)}</span><span class="pill">${escapeHtml(idea.subcategory)}</span>${idea.urgent ? `<span class="pill urgent">紧急处理</span>` : ""}${idea.deadline ? `<span class="pill deadline">${escapeHtml(deadlineLabel(idea.deadline))}</span>` : ""}${renderStars(idea.rating)}</div><h1 style="margin:0;font-size:34px;line-height:1.18;font-weight:650;color:#19213c;">${escapeHtml(idea.title)}</h1><p style="white-space:pre-wrap;line-height:1.82;color:#303951;">${escapeHtml(text || "还没有写内容。")}</p>${renderMindMap(idea)}<div class="meta">${(idea.tags||[]).map(t=>`<span class="pill">#${escapeHtml(t)}</span>`).join("")}</div></div><aside class="drawer-side"><strong>档案信息</strong><span>分类：${escapeHtml(idea.category)}</span><span>状态：${escapeHtml(idea.status)}</span><span>字数：${words}</span><span>创建：${escapeHtml(formatDate(idea.createdAt))}</span><button class="btn primary" type="button" onclick="document.querySelector('#detailDrawer').classList.remove('show');document.querySelector('#overlay').classList.remove('show');">返回</button></aside>`; els.overlay.classList.add("show"); els.detailDrawer.classList.add("show"); }
    function readFileAsDataUrl(file) { return new Promise((resolve, reject) => { const reader = new FileReader(); reader.onload = () => resolve(reader.result); reader.onerror = reject; reader.readAsDataURL(file); }); }

    buildVortex(); populateFormOptions(); render();
    updateCreateGlassTarget();
    const skipIntro = () => {
      els.intro.classList.add("hidden");
      if (vortexFrame) cancelAnimationFrame(vortexFrame);
    };
    const introTimer = setTimeout(skipIntro, 5200);
    els.enterBtn.addEventListener("click", skipIntro);
    els.intro.addEventListener("click", skipIntro);
    window.addEventListener("keydown", skipIntro, { once: true });
    window.addEventListener("wheel", skipIntro, { once: true, passive: true });
    window.addEventListener("scroll", updateCreateGlassTarget, { passive: true });
    window.addEventListener("resize", updateCreateGlassTarget);
    els.openCreate.addEventListener("click", () => openCreate());
    els.closeCreate.addEventListener("click", closeModal); els.closeDetail.addEventListener("click", closeDetail); els.overlay.addEventListener("click", () => { closeModal(); closeDetail(); });
    els.category.addEventListener("change", updateSubcategories);
    els.subcategory.addEventListener("change", updateConditionalFields);
    els.rating.addEventListener("input", () => syncRating(els.rating.value));
    els.ratingRange.addEventListener("input", () => syncRating(els.ratingRange.value));
    els.cover.addEventListener("change", async () => { const file = els.cover.files[0]; if (!file) return; pendingCover = await readFileAsDataUrl(file); els.coverPreview.src = pendingCover; els.coverPreview.classList.add("show"); });
    els.form.addEventListener("submit", (e) => { e.preventDefault(); const now = Date.now(); const existing = ideas.find(i => i.id === editingId); const rating = els.rating.value === "" ? "" : Math.max(0, Math.min(5, Number(els.rating.value))); const outline = collectOutline(); const category = selectedCategory(); const payload = { title: els.title.value.trim(), body: category === "同人文/小说" ? outline : els.body.value.trim(), category, subcategory: selectedSubcategory(), status: els.status.value, deadline: els.deadline.value, rating: Number.isNaN(rating) ? "" : rating, cover: pendingCover || existing?.cover || "", outline, tags: normalizeTags(els.tags.value), urgent: els.urgent.checked }; if (!payload.title) return els.title.focus(); if (editingId) ideas = ideas.map(i => i.id === editingId ? {...i, ...payload, updatedAt: now} : i); else ideas.unshift({ id: makeId(), ...payload, createdAt: now, updatedAt: now }); closeModal(); render(); });
    els.clearBtn.addEventListener("click", () => openCreate(editingId));
    els.search.addEventListener("input", render); els.statusFilter.addEventListener("change", render);
    els.nav.addEventListener("click", (e) => { const b = e.target.closest("button[data-cat]"); if (!b) return; activeCategory = b.dataset.cat; activeSubcategory = "all"; render(); });
    els.subFilters.addEventListener("click", (e) => { const b = e.target.closest("button[data-sub]"); if (!b) return; activeSubcategory = b.dataset.sub; render(); });
    els.list.addEventListener("click", (e) => { const card = e.target.closest(".card"); if (!card) return; const id = card.dataset.id; const btn = e.target.closest("button[data-action]"); if (!btn && e.target.closest(".card-tools")) return; if (!btn) return showDetail(id); const action = btn.dataset.action; if (action === "urgent") { ideas = ideas.map(i => i.id === id ? {...i, urgent: !i.urgent, updatedAt: Date.now()} : i); render(); } if (action === "edit") openCreate(id); if (action === "delete" && confirm("删除这条灵感吗？")) { ideas = ideas.filter(i => i.id !== id); render(); } });
  </script>
